<svg xmlns="http://www.w3.org/2000/svg" width="720" height="220" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">Allegro Manager logo</title>
  <desc id="desc">Original logo mark for Allegro Manager: an amber marketplace box with an upward management graph, followed by the name Allegro Manager.</desc>
  <defs>
    <linearGradient id="amber" x1="30" y1="28" x2="168" y2="168" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffb11f"/>
      <stop offset="0.58" stop-color="#ff6b00"/>
      <stop offset="1" stop-color="#da3f00"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#8a2e00" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="30" y="30" width="160" height="160" rx="42" fill="url(#amber)"/>
    <path d="M68 84c0-13.8 11.2-25 25-25h34c13.8 0 25 11.2 25 25v10h-16V84c0-5-4-9-9-9H93c-5 0-9 4-9 9v10H68V84z" fill="#fff7ed" opacity="0.96"/>
    <path d="M63 94h94c8.8 0 16 7.2 16 16v34c0 8.8-7.2 16-16 16H63c-8.8 0-16-7.2-16-16v-34c0-8.8 7.2-16 16-16z" fill="#fff7ed" opacity="0.98"/>
    <path d="M70 137l24-24 20 18 35-39" fill="none" stroke="#1f2937" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="70" cy="137" r="7" fill="#1f2937"/>
    <circle cx="94" cy="113" r="7" fill="#1f2937"/>
    <circle cx="114" cy="131" r="7" fill="#1f2937"/>
    <circle cx="149" cy="92" r="7" fill="#1f2937"/>
  </g>

  <g fill="#111827">
    <text x="226" y="101" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="57" font-weight="780" letter-spacing="-2.2">Allegro</text>
    <text x="226" y="154" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="49" font-weight="640" letter-spacing="-1.4" fill="#374151">Manager</text>
  </g>
  <path d="M226 176h280" stroke="#ff6b00" stroke-width="8" stroke-linecap="round"/>
  <path d="M518 176h46" stroke="#111827" stroke-width="8" stroke-linecap="round" opacity="0.18"/>
