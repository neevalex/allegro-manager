name: Deploy Allegro Manager

"on":
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-allegro-manager-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - allegro-manager
    timeout-minutes: 20

    env:
      APP_PATH: /var/www/allegro-manager
      WEB_PATH: /var/www/html/allegro

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure runtime directories exist
        run: |
          mkdir -p "$APP_PATH/app" "$APP_PATH/data/woo-allegro-drafts" "$APP_PATH/data/woo-allegro-logs" "$WEB_PATH/assets"

      - name: Deploy shared app code
        run: |
          rsync -az --delete --exclude '.gitkeep' app/ "$APP_PATH/app/"
          rsync -az config.example.php refresh_dashboard_summary.php "$APP_PATH/"

      - name: Deploy web root
        run: |
          rsync -az --delete public/ "$WEB_PATH/"

      - name: Post-deploy verification
        run: |
          set -e
          php -l /var/www/allegro-manager/app/AllegroClient.php >/dev/null
          php -l /var/www/allegro-manager/refresh_dashboard_summary.php >/dev/null
          for file in /var/www/html/allegro/*.php; do
            php -l "$file" >/dev/null
          done
          test -d /var/www/allegro-manager/data
          test -f /var/www/html/allegro/index.php
          echo "Deploy verification passed"
