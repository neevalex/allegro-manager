name: Deploy Allegro Manager

"on":
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-allegro-manager-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - allegro-manager
    timeout-minutes: 20

    env:
      APP_PATH: /var/www/allegro-manager

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure runtime directories exist
        run: |
          mkdir -p "$APP_PATH/app" "$APP_PATH/assets" "$APP_PATH/data/woo-allegro-drafts" "$APP_PATH/data/woo-allegro-logs"

      - name: Deploy shared app code
        run: |
          rsync -az --delete --exclude '.gitkeep' app/ "$APP_PATH/app/"
          rsync -az config.example.php refresh_dashboard_summary.php "$APP_PATH/"

      - name: Deploy web root into app root
        run: |
          rsync -az --delete \
            --exclude 'app/' \
            --exclude 'data/' \
            --exclude 'config.php' \
            --exclude 'config.example.php' \
            --exclude 'refresh_dashboard_summary.php' \
            public/ "$APP_PATH/"

      - name: Post-deploy verification
        run: |
          set -e
          php -l "$APP_PATH/app/AllegroClient.php" >/dev/null
          php -l "$APP_PATH/refresh_dashboard_summary.php" >/dev/null
          for file in "$APP_PATH"/*.php; do
            php -l "$file" >/dev/null
          done
          test -d "$APP_PATH/data"
          test -f "$APP_PATH/index.php"
          test -f "$APP_PATH/bootstrap.php"
          test -f "$APP_PATH/assets/allegro-manager-logo.svg"
          echo "Deploy verification passed"
